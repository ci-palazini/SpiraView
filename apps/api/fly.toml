app = "tpm-fullstack"
primary_region = "gru"

[build]
  # Use the Dockerfile from the monorepo root
  dockerfile = "../Dockerfile"
  # Set build context to the monorepo root
  context = ".."

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
